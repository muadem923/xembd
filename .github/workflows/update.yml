name: Quet Chuoi Chien Luong Son va Ga Vang v4.4.3 - FLV Fix

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: multi-source-live-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: 1. Lay code tu kho ve
        uses: actions/checkout@v4
        with:
          fetch-depth: 3

      - name: 2. Cai dat Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 3. Cai dat Playwright Chromium
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install playwright
          python -m playwright install --with-deps chromium

      - name: 4. Audit source va bo gop offline
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile main.py merger.py sources/hybrid_support.py sources/chuoichien.py sources/luongson.py sources/gavang.py
          python -m unittest discover -s tests -v

      - name: 5. Quet ba nguon va hien log realtime
        shell: bash
        env:
          PYTHONUNBUFFERED: "1"
          MULTI_RUN_SOURCES_PARALLEL: "1"
          MULTI_MAX_STREAMS_PER_MATCH: "2"
          MULTI_UPCOMING_KEEP_HOURS: "4"

          SOCOLIVE_HOME_URLS: "https://live04.chuoichientv.me/,https://live03.chuoichientv.me/"
          SOCOLIVE_MATCH_CONCURRENCY: "3"
          SOCOLIVE_HOME_WAIT_MS: "5000"
          SOCOLIVE_ROOM_WAIT_SECONDS: "20"
          SOCOLIVE_SCAN_PAST_MINUTES: "150"
          SOCOLIVE_SCAN_FUTURE_MINUTES: "240"
          SOCOLIVE_HYBRID_HTTP_FIRST: "1"
          SOCOLIVE_HTTP_DISCOVERY_TIMEOUT_SECONDS: "8"
          SOCOLIVE_HTTP_DISCOVERY_MAX_FOLLOWS: "4"
          SOCOLIVE_DELTA_SCAN_ENABLED: "1"
          SOCOLIVE_DELTA_NEAR_MINUTES: "45"
          SOCOLIVE_STATE_PATH: "chuoichien_state.json"
          SOCOLIVE_SCAN_UNKNOWN_LIVE: "1"
          SOCOLIVE_FULL_SCAN: "1"
          SOCOLIVE_VERIFY_STREAMS: "1"
          SOCOLIVE_VERIFY_TIMEOUT_SECONDS: "6"
          SOCOLIVE_MAX_VERIFY_CANDIDATES: "4"
          SOCOLIVE_MAX_OUTPUT_STREAMS_PER_MATCH: "2"
          SOCOLIVE_UPCOMING_KEEP_HOURS: "4"
          SOCOLIVE_UPCOMING_FAR_THRESHOLD_MINUTES: "45"
          SOCOLIVE_UPCOMING_FAR_WAIT_SECONDS: "7"
          SOCOLIVE_UPCOMING_NEAR_WAIT_SECONDS: "12"
          SOCOLIVE_KEEP_PREVIOUS_UNVERIFIED: "0"
          SOCOLIVE_ALLOW_UNVERIFIED_BROWSER_FALLBACK: "0"

          HYGENIE_HOME_URLS: "https://catbee.io/,https://hygenie.io/"
          HYGENIE_MATCH_CONCURRENCY: "3"
          HYGENIE_HOME_WAIT_MS: "6000"
          HYGENIE_ROOM_WAIT_SECONDS: "20"
          HYGENIE_SCAN_PAST_MINUTES: "150"
          HYGENIE_SCAN_FUTURE_MINUTES: "240"
          HYGENIE_HYBRID_HTTP_FIRST: "1"
          HYGENIE_HTTP_DISCOVERY_TIMEOUT_SECONDS: "8"
          HYGENIE_HTTP_DISCOVERY_MAX_FOLLOWS: "4"
          HYGENIE_DELTA_SCAN_ENABLED: "1"
          HYGENIE_DELTA_NEAR_MINUTES: "45"
          HYGENIE_STATE_PATH: "hygenie_state.json"
          HYGENIE_SCAN_UNKNOWN_LIVE: "1"
          HYGENIE_FULL_SCAN: "1"
          HYGENIE_VERIFY_STREAMS: "1"
          HYGENIE_VERIFY_TIMEOUT_SECONDS: "6"
          HYGENIE_MAX_VERIFY_CANDIDATES: "4"
          HYGENIE_MAX_OUTPUT_STREAMS_PER_MATCH: "2"
          HYGENIE_UPCOMING_FAR_THRESHOLD_MINUTES: "45"
          HYGENIE_UPCOMING_FAR_WAIT_SECONDS: "7"
          HYGENIE_UPCOMING_NEAR_WAIT_SECONDS: "12"

          GAVANG_HOME_URLS: "https://smorf.io/"
          GAVANG_MATCH_CONCURRENCY: "3"
          GAVANG_HOME_WAIT_MS: "6000"
          GAVANG_ROOM_WAIT_SECONDS: "16"
          GAVANG_SCAN_PAST_MINUTES: "150"
          GAVANG_SCAN_FUTURE_MINUTES: "240"
          GAVANG_HYBRID_HTTP_FIRST: "1"
          GAVANG_HTTP_DISCOVERY_TIMEOUT_SECONDS: "8"
          GAVANG_HTTP_DISCOVERY_MAX_FOLLOWS: "3"
          GAVANG_DELTA_SCAN_ENABLED: "1"
          GAVANG_DELTA_NEAR_MINUTES: "45"
          GAVANG_STATE_PATH: "gavang_state.json"
          GAVANG_SCAN_UNKNOWN_LIVE: "1"
          GAVANG_PROBE_UNKNOWN_STREAM_KEYS: "1"
          GAVANG_FULL_SCAN: "1"
          GAVANG_VERIFY_STREAMS: "1"
          GAVANG_VERIFY_TIMEOUT_SECONDS: "7"
          GAVANG_MAX_VERIFY_CANDIDATES: "4"
          GAVANG_MAX_OUTPUT_STREAMS_PER_MATCH: "2"
          GAVANG_UPCOMING_KEEP_HOURS: "4"
          GAVANG_UPCOMING_FAR_THRESHOLD_MINUTES: "45"
          GAVANG_UPCOMING_FAR_WAIT_SECONDS: "6"
          GAVANG_UPCOMING_NEAR_WAIT_SECONDS: "10"
          GAVANG_KEEP_PREVIOUS_UNVERIFIED: "0"
          GAVANG_ALLOW_UNVERIFIED_BROWSER_FALLBACK: "0"
        run: |
          set -o pipefail
          python -u main.py 2>&1 | tee multi_source_scan.log

      - name: 6. Audit playlist chung
        shell: bash
        run: |
          set -euo pipefail
          test -f all_live.m3u
          test -f all_live_debug.json

          mapfile -t generated_m3u < <(find . -type f -name '*.m3u' -printf '%P\n' | sort)
          if [[ ${#generated_m3u[@]} -ne 1 || "${generated_m3u[0]}" != "all_live.m3u" ]]; then
            echo "::error::Sau khi gộp chỉ được tồn tại duy nhất all_live.m3u. Đang có: ${generated_m3u[*]:-không có}"
            exit 1
          fi

          if grep -E '^https?://.*\|User-Agent=' all_live.m3u; then
            echo "::error::Playlist mac dinh khong duoc noi pipe header vao URL."
            exit 1
          fi

          python - <<'PY_AUDIT'
          import json
          import re
          from collections import Counter
          from pathlib import Path

          report = json.loads(Path("all_live_debug.json").read_text(encoding="utf-8"))
          failures = []
          urls = []
          per_match_quality = Counter()

          # Scanner phải lọc TRƯỚC khi mở trang trận: -150 phút đến +240 phút.
          for debug_name in ("chuoichien_debug.json", "hygenie_debug.json", "gavang_debug.json"):
              debug_path = Path(debug_name)
              if not debug_path.exists():
                  continue
              payload = json.loads(debug_path.read_text(encoding="utf-8"))
              rows = payload if isinstance(payload, list) else payload.get("results", [])
              for row in rows:
                  delta = row.get("minutes_to_kickoff")
                  reason = row.get("scan_window_reason", "")
                  if isinstance(delta, int) and not (-150 <= delta <= 240):
                      failures.append(f"{debug_name}: quét ngoài cửa sổ {delta} phút: {row.get('url')}")
                  if delta is None and reason not in {"unknown-time-live", "unknown-time-derived-probe", ""}:
                      failures.append(f"{debug_name}: lý do giờ không hợp lệ {reason}: {row.get('url')}")

          expected_groups = {"chuoichien": "Chuối Chiên", "luongson": "Lương Sơn", "gavang": "Gà Vàng"}
          for channel in report.get("channels", []):
              url = channel.get("url", "")
              urls.append(url)
              expected_group = expected_groups.get(channel.get("source"))
              if channel.get("group") != expected_group:
                  failures.append(f"Sai nhóm nguồn: {channel.get('source')} -> {channel.get('group')} (cần {expected_group})")
              if channel.get("playability") not in {"verified", "browser-observed", "upcoming-pending"}:
                  failures.append(f"Trang thai khong hop le: {url}")
              key = (channel.get("match_key"), channel.get("quality"))
              per_match_quality[key] += 1

          if len(urls) != len(set(urls)):
              failures.append("Playlist chung co URL trung lap")

          for (match_key, quality), count in per_match_quality.items():
              if count > 1:
                  failures.append(f"Trung chat luong {quality} trong {match_key}: {count}")

          text = Path("all_live.m3u").read_text(encoding="utf-8")
          for line in text.splitlines():
              if line.startswith("#EXTINF"):
                  match = re.search(r'group-title="([^"]+)"', line)
                  if not match or match.group(1) not in {"Chuối Chiên", "Lương Sơn", "Gà Vàng"}:
                      failures.append(f"group-title khong hop le: {line}")

          if failures:
              for item in failures:
                  print(f"::error::{item}")
              raise SystemExit(1)

          print(f"Audit OK: {len(urls)} stream chung; nguon={report.get('sources')}")
          PY_AUDIT

          echo "--- Playlist chung ---"
          sed -n '1,160p' all_live.m3u

      - name: 7. Tai artifact debug
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: multi-source-debug-${{ github.run_id }}
          path: |
            all_live.m3u
            all_live_debug.json
            chuoichien_debug.json
            hygenie_debug.json
            gavang_debug.json
            *_home_debug.html
            *_home_debug.png
            multi_source_scan.log
            chuoichien_state.json
            hygenie_state.json
            gavang_state.json
          if-no-files-found: ignore
          retention-days: 3

      - name: 8. Luu playlist len GitHub
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          test -f all_live.m3u

          # Xóa các playlist nhiều-file của bản cũ khỏi repository nếu chúng từng được commit.
          old_playlists=(
            all_live_pipe.m3u all_live_vlc.m3u
            chuoichien_live.m3u chuoichien_live_pipe.m3u chuoichien_live_vlc.m3u
            hygenie_live.m3u hygenie_live_pipe.m3u hygenie_live_vlc.m3u
            gavang_live.m3u gavang_live_pipe.m3u gavang_live_vlc.m3u
            luongson_live.m3u luongson_live_pipe.m3u luongson_live_vlc.m3u
            chuoichien/chuoichien_live.m3u chuoichien/chuoichien_live_pipe.m3u chuoichien/chuoichien_live_vlc.m3u
            luongson/hygenie_live.m3u luongson/hygenie_live_pipe.m3u luongson/hygenie_live_vlc.m3u
            gavang/gavang_live.m3u gavang/gavang_live_pipe.m3u gavang/gavang_live_vlc.m3u
          )
          git rm -f --ignore-unmatch -- "${old_playlists[@]}"
          files_to_add=(all_live.m3u all_live_debug.json)
          [[ -f chuoichien_state.json ]] && files_to_add+=(chuoichien_state.json)
          [[ -f hygenie_state.json ]] && files_to_add+=(hygenie_state.json)
          [[ -f gavang_state.json ]] && files_to_add+=(gavang_state.json)
          git add -- "${files_to_add[@]}"
          if git diff --cached --quiet; then
            echo "Playlist khong thay doi; khong can commit."
            exit 0
          fi

          git commit -m "Update live streams v4.4.3 (Gavang FLV fix)"
          git push origin "HEAD:${GITHUB_REF_NAME}"
